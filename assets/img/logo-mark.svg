<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 120" role="img" aria-labelledby="markTitle markDesc">
  <title id="markTitle">Takumi mark</title>
  <desc id="markDesc">Takumi brand mark: a cluster of seven bright-blue diamonds.</desc>
  <g fill="#007BFF">
    <polygon points="60,0 90,30 60,60 30,30"/>
    <polygon points="120,0 150,30 120,60 90,30"/>
    <polygon points="30,30 60,60 30,90 0,60"/>
    <polygon points="90,30 120,60 90,90 60,60"/>
    <polygon points="150,30 180,60 150,90 120,60"/>
    <polygon points="60,60 90,90 60,120 30,90"/>
    <polygon points="120,60 150,90 120,120 90,90"/>
  </g>
</svg>
