<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 120" role="img" aria-labelledby="logoTitle logoDesc" preserveAspectRatio="xMinYMid meet">
  <title id="logoTitle">Takumi Stamping Canada Inc</title>
  <desc id="logoDesc">Takumi Stamping Canada Inc logo: four red diamonds to the left of the TAKUMI wordmark, with STAMPING CANADA INC set beneath.</desc>

  <defs>
    <style>
      .tk-wordmark { font-family: "Helvetica Neue", "Arial Black", "Liberation Sans", Arial, sans-serif; font-weight: 900; letter-spacing: 0.005em; }
      .tk-subline  { font-family: "Helvetica Neue", "Arial", "Liberation Sans", sans-serif; font-weight: 700; letter-spacing: 0.24em; }
    </style>
  </defs>

  <!-- Four red diamonds (tip-to-tip, hairline-overlapping).
       Each diamond: 64 wide × 60 tall; centres stepped by 58px so points just touch. -->
  <g fill="#C8102E">
    <polygon points="20,60 52,30 84,60 52,90"/>
    <polygon points="78,60 110,30 142,60 110,90"/>
    <polygon points="136,60 168,30 200,60 168,90"/>
    <polygon points="194,60 226,30 258,60 226,90"/>
  </g>

  <!-- Wordmark: TAKUMI -->
  <text x="282" y="78" class="tk-wordmark" font-size="64" fill="#000000">TAKUMI</text>

  <!-- Subline: STAMPING CANADA INC -->
  <text x="284" y="102" class="tk-subline" font-size="14" fill="#000000">STAMPING CANADA INC</text>
</svg>
