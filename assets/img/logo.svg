<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Takumi Stamping Canada</title>
  <desc id="logoDesc">Takumi Stamping Canada wordmark logo with a red stamped seal mark containing the artisan kanji.</desc>

  <defs>
    <style>
      .wordmark { font-family: 'Helvetica Neue', 'Arial', 'Liberation Sans', sans-serif; font-weight: 700; letter-spacing: 2px; }
      .subline  { font-family: 'Helvetica Neue', 'Arial', 'Liberation Sans', sans-serif; font-weight: 500; letter-spacing: 6px; }
      .seal     { font-family: 'Noto Serif CJK JP', 'Yu Mincho', 'MS Mincho', 'serif'; font-weight: 700; }
    </style>
  </defs>

  <!-- Red seal / stamp mark -->
  <g transform="translate(20 20)">
    <rect x="0" y="0" width="120" height="120" rx="8" ry="8" fill="#C8102E"/>
    <rect x="6" y="6" width="108" height="108" rx="4" ry="4" fill="none" stroke="#ffffff" stroke-width="2"/>
    <text x="60" y="88" class="seal" font-size="80" fill="#ffffff" text-anchor="middle">匠</text>
  </g>

  <!-- Wordmark -->
  <text x="160" y="82" class="wordmark" font-size="54" fill="#1a1a1a">TAKUMI</text>
  <line x1="160" y1="98" x2="478" y2="98" stroke="#C8102E" stroke-width="2"/>
  <text x="160" y="124" class="subline" font-size="16" fill="#1a1a1a">STAMPING CANADA</text>
</svg>
