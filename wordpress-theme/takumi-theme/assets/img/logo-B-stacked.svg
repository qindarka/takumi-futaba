<?xml version="1.0" encoding="UTF-8"?>
<!-- Variation B: Stacked. Diamonds centered up top, TAKUMI below, subline beneath.
     Near-square aspect ratio so the diamonds feel prominent. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" role="img" aria-label="Takumi Stamping Canada">
  <g fill="#007BFF" transform="translate(50 20)">
    <polygon points="60,0 90,30 60,60 30,30"/>
    <polygon points="120,0 150,30 120,60 90,30"/>
    <polygon points="30,30 60,60 30,90 0,60"/>
    <polygon points="90,30 120,60 90,90 60,60"/>
    <polygon points="150,30 180,60 150,90 120,60"/>
    <polygon points="60,60 90,90 60,120 30,90"/>
    <polygon points="120,60 150,90 120,120 90,90"/>
  </g>
  <text x="140" y="200" text-anchor="middle" font-family="Helvetica Neue, Arial Black, Arial, sans-serif" font-weight="900" font-size="50" fill="#0a0a0a" letter-spacing="2">TAKUMI</text>
  <text x="140" y="232" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="16" fill="#555" letter-spacing="3">STAMPING CANADA INC</text>
</svg>
